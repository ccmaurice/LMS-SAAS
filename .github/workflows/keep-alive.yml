name: Database Keep Alive

on:
  schedule:
    # Run every 3 days at 00:00 UTC to prevent Supabase inactivity pausing
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger via the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run postinstall

      - name: Run Keep-Alive Ping
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set or empty in GitHub Secrets. Please add it under Repository Secrets."
            exit 1
          fi
          npx tsx scripts/keep-alive.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
